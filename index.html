<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متحف آرت هيفن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

    <a href="server.html" class="nav-btn">السيرفر</a>

    <div id="image-viewer" onclick="closeViewer()" ondblclick="closeViewer()">
        <img id="full-image" src="">
    </div>

    <div class="curtain" id="curtain" onclick="openCurtain()">
        <div class="curtain-side left"></div>
        <div class="curtain-side right"></div>
        <div class="welcome-msg">
            <h2 class="brand-name">آرت هيفن</h2>
            <p>اضغط للفتح</p>
        </div>
    </div>

    <h1 class="museum-title">متحف آرت هيفن</h1>

    <div class="museum" id="top3-container"></div>
    <div class="silver-gallery" id="silver-container"></div>

    <div onclick="toggleAdmin()" style="position:fixed; bottom:0; left:0; width:40px; height:40px; cursor:pointer; opacity:0; z-index:5000;"></div>
    
    <div id="admin-panel" style="display:none; position:fixed; bottom:10px; right:10px; background:#222; padding:15px; border-radius:15px; border:1px solid #d4af37; z-index:5001; width: 250px;">
        <input type="number" id="imgOrder" placeholder="رقم المركز" style="width:100%; margin-bottom:10px; background:#333; color:#fff; border:1px solid #444; padding:8px;">
        <input type="text" id="artistName" placeholder="اسم الرسام" style="width:100%; margin-bottom:10px; background:#333; color:#fff; border:1px solid #444; padding:8px;">
        <input type="file" id="imageInput" style="color: #fff; font-size: 12px; margin-bottom: 10px;">
        <button onclick="uploadImage()" style="width:100%; background:#d4af37; border:none; padding:10px; font-weight:bold;">نشر</button>
        <button onclick="toggleAdmin()" style="background:none; color:red; border:none; width:100%; margin-top:5px;">إغلاق</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3boy-qFEQsumI-c56wrjb-q-bBvpGaZc",
            authDomain: "art-heaven-2ebcc.firebaseapp.com",
            databaseURL: "https://art-heaven-2ebcc-default-rtdb.firebaseio.com",
            projectId: "art-heaven-2ebcc",
            storageBucket: "art-heaven-2ebcc.firebasestorage.app",
            messagingSenderId: "982139498852",
            appId: "1:982139498852:web:fcb1bec8520a896e988a71"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function openCurtain() { document.getElementById('curtain').classList.add('opened'); }
        function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display==='none'?'block':'none'; }

        function viewImage(src) {
            document.getElementById('full-image').src = src;
            document.getElementById('image-viewer').style.display = 'flex';
            document.body.classList.add('modal-open');
        }
        function closeViewer() {
            document.getElementById('image-viewer').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        async function uploadImage() {
            const file = document.getElementById('imageInput').files[0];
            const order = document.getElementById('imgOrder').value;
            const name = document.getElementById('artistName').value || "رسام مبدع";
            if(!file || !order) return alert("أكمل البيانات!");
            
            const fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=9f747dc546be7780cc631dd85cd4be26`, {method:'POST', body:fd});
                const d = await res.json();
                if(d.success) {
                    await db.ref('museum/'+order).set({url: d.data.url, order: parseInt(order), label: name});
                    alert("تم النشر!");
                }
            } catch(e) { alert("خطأ في الاتصال!"); }
        }

        db.ref('museum').on('value', (snap) => {
            const top3 = document.getElementById('top3-container');
            const silver = document.getElementById('silver-container');
            top3.innerHTML = ''; silver.innerHTML = '';
            const data = snap.val() || {};

            // صورة افتراضية فخمة ومستطيلة
            const placeholder = "https://placehold.co/600x900/0a0a0a/d4af37?text=Art+Heaven";

            for(let i=1; i<=9; i++) {
                const art = data[i] || {url: placeholder, label: 'الرتبة شاغرة حالياً'};
                const isTop = i <= 3;
                let frameClass = "";
                let rankText = "";

                if (i === 1) { frameClass = "gojo"; rankText = "المركز الأول"; }
                else if (i === 2) { frameClass = "geto"; rankText = "المركز الثاني"; }
                else if (i === 3) { frameClass = "shoko"; rankText = "المركز الثالث"; }
                else { frameClass = "silver"; rankText = "المركز " + i; }

                const html = `
                    <div class="frame ${frameClass}" style="position: relative; overflow: hidden; border-radius: 15px; background: #111;">
                        <div class="rank-tag" style="position: absolute; top: 15px; width: 100%; text-align: center; color: #ffd700; font-weight: 900; font-size: 1.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0 0 10px rgba(212,175,55,0.6); z-index: 10; background: transparent;">
                            ${rankText}
                        </div>
                        
                        <img src="${art.url}" 
                             ondblclick="viewImage('${art.url}')" 
                             onerror="this.src='${placeholder}'"
                             style="width: 100%; height: 100%; object-fit: cover; display: block;">
                        
                        <div style="position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: #d4af37; padding: 20px 5px 10px; text-align: center; font-size: 14px; font-weight: bold; z-index: 5;">
                            ${art.label}
                        </div>
                    </div>`;

                if(isTop) top3.innerHTML += html;
                else silver.innerHTML += html;
            }
        });
    </script>
</body>
</html>
