<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متحف آرت هيفن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* =========================================
           تنسيق آرت هيفن الموحد - عمر
           تعديل: منصة هرمية + بلور + اسم فوق الرسمة
           ========================================= */
        :root {
            --gold: #d4af37;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --glow: rgba(212, 175, 55, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #2a2a2a 0%, #0d0d0d 40%, #000000 100%);
            background-size: 200% 200%;
            background-attachment: fixed;
            color: white; font-family: 'Cairo', sans-serif;
            overflow-x: hidden; direction: rtl;
            animation: bgMove 10s ease-in-out infinite;
        }

        @keyframes bgMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* 1. القائمة الجانبية */
        .menu-icon {
            position: fixed; top: 15px; right: 15px; z-index: 2000001; cursor: pointer;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 5px; border: 1px solid var(--gold);
        }
        .menu-icon span { width: 25px; height: 3px; background: var(--gold); }

        .side-menu {
            position: fixed; top: 0; right: -300px; width: 260px; height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px);
            border-left: 2px solid var(--gold); z-index: 2000005; transition: 0.4s;
            padding: 80px 20px;
        }
        .side-menu.open { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        .close-menu { position: absolute; top: 20px; left: 20px; font-size: 26px; color: var(--gold); cursor: pointer; }

        .menu-item {
            display: block; color: white; text-decoration: none; padding: 15px; margin-bottom: 12px;
            background: #1a1a1a; border-radius: 10px; text-align: center; font-weight: bold; transition: 0.3s;
        }
        .menu-item:hover { background: #222; color: var(--gold); }

        /* 2. الإنترو والستارة */
        #intro-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 3000000; display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        .curtain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2000000; display: none; justify-content: center; align-items: center; overflow: hidden;
        }
        .curtain.opened { pointer-events: none; }
        .curtain-side {
            position: absolute; width: 50.5%; height: 100%; background: #7a0000;
            background-image: repeating-linear-gradient(90deg, #7a0000, #7a0000 40px, #8b0000 41px, #8b0000 80px);
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .left { left: 0; border-right: 1px solid var(--gold); }
        .right { right: 0; border-left: 1px solid var(--gold); }
        .curtain.opened .left { transform: translateX(-100%); }
        .curtain.opened .right { transform: translateX(100%); }

        .welcome-msg { position: relative; z-index: 2000001; text-align: center; transition: 0.5s; }
        .curtain.opened .welcome-msg { opacity: 0; visibility: hidden; }

        /* 3. منصة التتويج الهرمية (الكمبيوتر) */
        .museum {
            display: grid;
            grid-template-areas: 
                ". first ."
                "third . second"; 
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px; padding: 150px 20px 50px; max-width: 1100px; margin: auto; align-items: start;
        }

        /* الإطارات واللمعة */
        .frame {
            position: relative; background: none; border-radius: 20px; overflow: hidden;
            transition: 0.4s; border: 2px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }
        .frame img { width: 100%; height: 420px; object-fit: cover; display: block; transition: 0.6s; }
        .frame::before {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-25deg); transition: 0.6s; z-index: 5;
        }
        .frame:hover::before { left: 150%; }
        .frame:hover { transform: translateY(-10px); border-color: var(--gold); }

        /* تخصيص رتب التوب 3 - الهرم */
        .gojo { 
            grid-area: first; width: 380px; margin: 0 auto 40px auto; 
            border: 4px solid #ffd700 !important; z-index: 10; 
        }
        .gojo img { height: 500px !important; }

        .geto { grid-area: second; border: 3px solid var(--silver) !important; width: 320px; margin-right: auto; }
        .shoko { grid-area: third; border: 3px solid var(--bronze) !important; width: 320px; margin-left: auto; }

        /* شارة المركز مع تأثير البلور (Blur) */
        .rank-badge {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 8px 25px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.4); color: #ffd700;
            font-weight: 900; font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 10; white-space: nowrap;
        }

        /* اسم الرسام فوق الصورة */
        .artist-name {
            position: absolute; top: 65px; left: 50%; transform: translateX(-50%);
            font-size: 1rem; color: rgba(255, 255, 255, 0.9); font-weight: bold;
            z-index: 10; text-shadow: 0 2px 8px rgba(0,0,0,1);
        }

        /* 4. قاعة الفضة */
        .silver-gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; padding: 50px; max-width: 1200px; margin: auto;
        }
        .silver-gallery .frame img { height: 350px; }

        /* 5. الجوال */
        @media (max-width: 768px) {
            .museum { display: flex !important; flex-direction: column !important; align-items: center !important; gap: 30px; padding-top: 100px; }
            .gojo, .geto, .shoko { width: 92vw !important; transform: none !important; margin: 0 !important; }
            .gojo { order: 1; } .geto { order: 2; } .shoko { order: 3; }
            .silver-gallery { grid-template-columns: 1fr 1fr !important; padding: 15px; gap: 12px; }
            .silver-gallery .frame img { height: 260px !important; }
        }

        /* لوحة الإدارة */
        #login-screen {
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
            background:#111; padding:30px; border-radius:15px; border:2px solid var(--gold);
            z-index:4000000; text-align:center; width: 280px;
        }
    </style>
</head>

<body>

<div id="intro-container">
    <div id="start-overlay" style="position: absolute; width: 100%; text-align: center; top: 40%; z-index: 10;">
        <h2 style="color:var(--gold);">مرحباً بك في آرت هيفن</h2>
        <button onclick="playWithSound()" style="background:var(--gold); padding:15px 40px; border-radius:30px; cursor:pointer; font-weight:bold; border:none;">🔊 دخول العرض</button>
    </div>
    <video id="intro-video" playsinline>
        <source src="intro.mp4" type="video/mp4">
    </video>
    <button id="skip-btn" onclick="startMuseum()" style="display:none; position:fixed; bottom:30px; left:30px; z-index:3000005; background:rgba(0,0,0,0.6); color:var(--gold); border:1px solid var(--gold); padding:12px 24px; cursor:pointer; border-radius:8px;">تخطي العرض ←</button>
</div>

<div class="curtain" id="curtain" onclick="openCurtain()">
    <div class="curtain-side left"></div>
    <div class="curtain-side right"></div>
    <div class="welcome-msg">
        <h1 style="color:white; font-size:1.5rem;">مرحباً بكم في</h1>
        <h2 style="color:var(--gold); font-size:3.5rem; text-shadow:0 0 20px var(--glow);">آرت هيفن</h2>
        <p style="color:white; background: rgba(212,175,55,0.2); padding: 10px 20px; border-radius: 50px; border: 1px dashed var(--gold); display: inline-block; margin-top:15px;">اضغط لفتح الستارة 🏛️</p>
    </div>
</div>

<audio id="bg-music" loop><source src="bg.mp3" type="audio/mpeg"></audio>

<div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>
<div class="side-menu" id="sideMenu">
    <div class="close-menu" onclick="toggleMenu()">✕</div>
    <a href="server.html" target="_blank" class="menu-item">🌐 السيرفر</a>
    <div class="menu-item" onclick="toggleSettings()">⚙️ الإعدادات</div>
    <div id="settingsBox" style="display:none; padding:15px; background:#111; border-radius:10px; margin-top:5px;">
        <label style="color:var(--gold); font-size:12px;">مستوى الصوت</label>
        <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)" style="width:100%;">
    </div>
</div>

<div class="museum" id="top3-container"></div>
<div class="silver-gallery" id="silver-container"></div>

<div id="comments-section" style="max-width: 900px; margin: 50px auto; padding: 20px;">
    <script src="https://giscus.app/client.js"
        data-repo="omarsib/art-heaven-museum"
        data-repo-id="R_kgDORdS7Fw"
        data-category="Show and tell"
        data-category-id="DIC_kwDORdS7F84C3rx6"
        data-mapping="pathname"
        data-theme="dark"
        data-lang="ar"
        crossorigin="anonymous"
        async>
    </script>
</div>

<div id="lightbox" onclick="closeLightbox()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000000; justify-content: center; align-items: center; cursor: zoom-out;">
    <img id="lightbox-img" src="" style="max-width: 95%; max-height: 95%; border: 2px solid var(--gold); border-radius: 10px; box-shadow: 0 0 30px rgba(212,175,55,0.4);">
</div>

<div id="login-screen">
    <h3 style="color:var(--gold);">منطقة الإدارة</h3>
    <input type="password" id="passInput" placeholder="كلمة السر..." style="width:85%; padding:10px; margin:15px 0; background:#222; border:1px solid #333; color:white;">
    <button onclick="checkPass()" style="background:var(--gold); padding:10px 30px; cursor:pointer; border-radius:5px; border:none; font-weight:bold;">دخول</button>
    <button onclick="closeLogin()" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer; display:block; width:100%;">إلغاء</button>
</div>

<div id="admin-panel" style="display:none; position:fixed; bottom:20px; right:20px; background:#111; padding:20px; border-radius:15px; border:2px solid var(--gold); z-index:5000000; width: 260px;">
    <h3 style="color:var(--gold);">إدارة المتحف</h3>
    <input type="number" id="imgOrder" placeholder="رقم المركز" style="width:100%; margin-bottom:10px; background:#222; color:#fff; padding:8px; border:1px solid #333;">
    <input type="text" id="artistName" placeholder="اسم الرسام..." style="width:100%; margin-bottom:10px; background:#222; color:#fff; padding:8px; border:1px solid #333;">
    <input type="file" id="imageInput" accept="image/*" style="width:100%; color:#fff; margin-bottom:10px;">
    <button onclick="uploadImage()" style="width:100%; background:var(--gold); padding:10px; font-weight:bold; cursor:pointer; border:none; border-radius:5px;">نشر اللوحة</button>
    <button onclick="hideAdmin()" style="color:red; background:none; border:none; margin-top:10px; width:100%; cursor:pointer;">إغلاق</button>
    <p id="status" style="color:gold; font-size:11px; text-align:center; margin-top:10px;"></p>
</div>

<div onclick="showLogin()" style="position:fixed; bottom:0; left:0; width:50px; height:50px; cursor:pointer; opacity:0; z-index:10000;"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyB3boy-qFEQsumI-c56wrjb-q-bBvpGaZc",
        authDomain: "art-heaven-2ebcc.firebaseapp.com",
        databaseURL: "https://art-heaven-2ebcc-default-rtdb.firebaseio.com",
        projectId: "art-heaven-2ebcc",
        storageBucket: "art-heaven-2ebcc.firebasestorage.app",
        messagingSenderId: "982139498852",
        appId: "1:982139498852:web:fcb1bec8520a896e988a71"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = '9f747dc546be7780cc631dd85cd4be26';

    function playWithSound() {
        const v = document.getElementById('intro-video');
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('skip-btn').style.display = 'block';
        v.play();
    }

    function startMuseum() {
        const intro = document.getElementById('intro-container');
        document.getElementById('intro-video').pause();
        intro.style.opacity = "0";
        setTimeout(() => { 
            intro.style.display = "none"; 
            document.getElementById('curtain').style.display = "flex"; 
        }, 800);
    }
    document.getElementById('intro-video').onended = startMuseum;

    function openCurtain() {
        document.getElementById('curtain').classList.add('opened');
        document.getElementById('bg-music').play();
    }

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
    function toggleSettings() { 
        const s = document.getElementById('settingsBox');
        s.style.display = (s.style.display === 'none') ? 'block' : 'none';
    }
    function changeVolume(v) { document.getElementById('bg-music').volume = v; }

    // جلب البيانات مع تطبيق كلاسات التوب 3 والنقر المزدوج
    db.ref('museum').on('value', (snapshot) => {
        const top3Container = document.getElementById('top3-container');
        const silverContainer = document.getElementById('silver-container');
        top3Container.innerHTML = ''; silverContainer.innerHTML = '';
        const data = snapshot.val() || {};

        const topClasses = { 1: 'gojo', 2: 'geto', 3: 'shoko' };

        for (let i = 1; i <= 10; i++) {
            const art = data[i] || { url: 'https://placehold.co/400x600?text=Empty', label: "شاغر" };
            const specialClass = topClasses[i] || '';

            const html = `
                <div class="frame ${specialClass}" ondblclick="openLightbox('${art.url}')">
                    <div class="rank-badge">المركز ${i}</div>
                    <div class="artist-name">${art.label}</div>
                    <img src="${art.url}" alt="Rank ${i}">
                </div>`;

            if (i <= 3) {
                top3Container.innerHTML += html;
            } else {
                silverContainer.innerHTML += html;
            }
        }
    });

    // وظائف التكبير
    function openLightbox(url) {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = url;
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // وظائف الإدارة
    function showLogin() { document.getElementById('login-screen').style.display = 'block'; }
    function closeLogin() { document.getElementById('login-screen').style.display = 'none'; }
    function checkPass() {
        if(document.getElementById('passInput').value === "1234") {
            closeLogin();
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("خطأ في كلمة السر!"); }
    }
    function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    async function uploadImage() {
        const file = document.getElementById('imageInput').files[0];
        const order = document.getElementById('imgOrder').value;
        const name = document.getElementById('artistName').value || "رسام مجهول";
        if (!file || !order) return alert("أكمل البيانات!");
        
        document.getElementById('status').innerText = "جاري رفع الصورة...";
        const fd = new FormData(); fd.append('image', file);
        
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const d = await res.json();
            if (d.success) {
                await db.ref('museum/' + order).set({ url: d.data.url, order: order, label: name });
                document.getElementById('status').innerText = "تم النشر بنجاح!";
                setTimeout(() => document.getElementById('status').innerText = "", 3000);
            }
        } catch (e) { 
            document.getElementById('status').innerText = "فشل الرفع!"; 
            console.error(e);
        }
    }
</script>

</body>
</html>
