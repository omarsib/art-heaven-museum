<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متحف آرت هيفن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* تصميم أيقونة القائمة */
        .menu-icon {
            position: fixed; top: 15px; right: 15px;
            cursor: pointer; z-index: 1001;
            background: rgba(212, 175, 55, 0.1);
            padding: 10px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .menu-icon span { width: 25px; height: 3px; background: #d4af37; border-radius: 2px; transition: 0.3s; }

        /* القائمة الجانبية */
        .side-menu {
            position: fixed; top: 0; right: -285px; 
            width: 260px; height: 100%; background: #0a0a0a;
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 80px 20px; font-family: 'Cairo';
            border-left: none; box-shadow: none;
        }
        .side-menu.open { right: 0; border-left: 2px solid #d4af37; box-shadow: -5px 0 20px rgba(0,0,0,0.8); }

        .menu-item {
            display: block; color: #fff; text-decoration: none;
            padding: 15px; margin-bottom: 12px;
            border-radius: 10px; background: #1a1a1a;
            font-weight: bold; border-right: 4px solid transparent;
            transition: 0.3s; cursor: pointer; text-align: center;
        }
        .menu-item:hover { background: #222; border-right-color: #d4af37; color: #d4af37; }

        .settings-box { display: none; padding: 15px; background: #111; border-radius: 10px; margin-top: 5px; border: 1px solid #333; }
        .settings-box label { color: #d4af37; font-size: 14px; display: block; margin-bottom: 10px; }
        input[type="range"] { width: 100%; accent-color: #d4af37; cursor: pointer; }

        /* الإدارة والأمان */
        #admin-panel {
            display:none; position:fixed; bottom:20px; right:20px; 
            background:#111; padding:20px; border-radius:15px; 
            border:1px solid #d4af37; z-index:9999; width: 260px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
        }
        #admin-panel input { width:100%; margin-bottom:10px; background:#222; color:#fff; padding:10px; border:1px solid #333; border-radius:5px; }
        
        /* نافذة طلب كلمة السر */
        #login-screen {
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
            background:#111; padding:25px; border-radius:15px; border:2px solid #d4af37;
            z-index:10001; text-align:center; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #image-viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 99999; 
            justify-content: center; align-items: center;
            cursor: pointer; flex-direction: column;
        }
        #image-viewer.active { display: flex; }
        #full-image { max-width: 95vw; max-height: 90vh; object-fit: contain; border: 1px solid #d4af37; animation: zoomIn 0.3s ease; }
        
        .rank-badge {
            position: absolute; top: 15px; width: 100%; text-align: center; color: #ffd700;
            font-weight: 900; font-size: 1.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); z-index: 10;
        }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="bg.mp3" type="audio/mpeg">
</audio>

<div class="menu-icon" onclick="toggleMenu()">
    <span></span><span></span><span></span>
</div>

<div class="side-menu" id="sideMenu">
    <a href="server.html" target="_blank" class="menu-item">🌐 السيرفر</a>
    <div class="menu-item" onclick="toggleSettings()">⚙️ الإعدادات</div>
    <div class="settings-box" id="settingsBox">
        <label>مستوى الموسيقى 🎵</label>
        <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)">
    </div>
</div>

<div class="curtain" id="curtain" onclick="openCurtain()">
    <div class="curtain-side left"></div>
    <div class="curtain-side right"></div>
    <div class="welcome-msg">
        <h1>مرحباً بكم في</h1>
        <h2 class="brand-name">آرت هيفن</h2>
        <p>اضغط هنا لفتح الستارة</p>
    </div>
</div>

<div id="image-viewer" onclick="closeViewer()" ondblclick="closeViewer()">
    <img id="full-image" src="">
</div>

<div class="museum" id="top3-container"></div>
<div class="silver-gallery" id="silver-container"></div>

<div id="comments-section" style="max-width: 900px; margin: 50px auto; padding: 20px;">
    </div>

<div id="login-screen">
    <h3 style="color:#d4af37; margin-bottom:15px; font-family:'Cairo';">منطقة المدير</h3>
    <input type="password" id="passInput" placeholder="أدخل كلمة السر..." style="padding:10px; background:#222; border:1px solid #d4af37; color:#fff; border-radius:5px; text-align:center;">
    <br><br>
    <button onclick="checkPass()" style="background:#d4af37; color:#000; padding:8px 25px; font-weight:bold; border:none; border-radius:5px; cursor:pointer;">دخول</button>
    <button onclick="closeLogin()" style="background:transparent; color:#ff4444; border:none; margin-top:10px; cursor:pointer; display:block; width:100%;">إلغاء</button>
</div>

<div id="admin-panel">
    <h3 style="color:#d4af37; margin-top:0;">إدارة المتحف</h3>
    <input type="number" id="imgOrder" placeholder="رقم المركز">
    <input type="text" id="artistName" placeholder="اسم الرسام...">
    <input type="file" id="imageInput" accept="image/*" style="color:#fff;">
    <button onclick="uploadImage()" id="uploadBtn" style="width:100%; background:#d4af37; color:#000; padding:12px; font-weight:bold; border:none; cursor:pointer;">نشر وتحديث</button>
    <p id="status" style="color:#ffd700; font-size:11px; margin-top:12px; text-align:center;"></p>
    <button onclick="toggleAdmin()" style="background:transparent; color:#ff4444; border:none; margin:10px auto; display:block; cursor:pointer;">إغلاق</button>
</div>

<div onclick="requestLogin()" style="position:fixed; bottom:0; left:0; width:40px; height:40px; cursor:pointer; opacity:0.01; background:white; z-index:10000;"></div>

<script>
    // --- بيانات FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyB3boy-qFEQsumI-c56wrjb-q-bBvpGaZc",
        authDomain: "art-heaven-2ebcc.firebaseapp.com",
        databaseURL: "https://art-heaven-2ebcc-default-rtdb.firebaseio.com",
        projectId: "art-heaven-2ebcc",
        storageBucket: "art-heaven-2ebcc.firebasestorage.app",
        messagingSenderId: "982139498852",
        appId: "1:982139498852:web:fcb1bec8520a896e988a71"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = '9f747dc546be7780cc631dd85cd4be26';

    // --- وظائف الأمان ---
    const CORRECT_PASSWORD = "1234"; // غير كلمة السر هنا يا عمر

    function requestLogin() {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('passInput').focus();
    }

    function closeLogin() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('passInput').value = '';
    }

    function checkPass() {
        const input = document.getElementById('passInput').value;
        if (input === CORRECT_PASSWORD) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('passInput').value = '';
        } else {
            alert("كلمة السر خاطئة!");
            document.getElementById('passInput').value = '';
        }
    }

    // --- بقية الوظائف ---
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
    function toggleSettings() {
        const box = document.getElementById('settingsBox');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }
    function changeVolume(val) { document.getElementById('bg-music').volume = val; }

    function openCurtain() { 
        document.getElementById('curtain').classList.add('opened');
        const music = document.getElementById('bg-music');
        music.play().catch(e => console.log("الصوت يحتاج تفاعل"));
    }

    function toggleAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    
    function viewImage(src) {
        const viewer = document.getElementById('image-viewer');
        const fullImg = document.getElementById('full-image');
        fullImg.src = src; viewer.classList.add('active');
        document.body.classList.add('modal-open');
    }
    function closeViewer() {
        document.getElementById('image-viewer').classList.remove('active');
        document.body.classList.remove('modal-open');
    }

    async function uploadImage() {
        const file = document.getElementById('imageInput').files[0];
        const order = parseInt(document.getElementById('imgOrder').value);
        const name = document.getElementById('artistName').value || ("الرسام المبدع");
        const status = document.getElementById('status');
        if (!file || isNaN(order)) return alert("أكمل البيانات!");
        status.innerText = "جاري الرفع...";
        const fd = new FormData(); fd.append('image', file);
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const d = await res.json();
            if (d.success) {
                await db.ref('museum/' + order).set({ url: d.data.url, order: order, label: name });
                status.innerText = "تم النشر بنجاح!";
            }
        } catch (e) { status.innerText = "فشل الرفع!"; }
    }

    db.ref('museum').on('value', (snapshot) => {
        const top3 = document.getElementById('top3-container');
        const silver = document.getElementById('silver-container');
        top3.innerHTML = ''; silver.innerHTML = '';
        const cloudData = snapshot.val() || {};
        const placeholder = 'https://placehold.co/600x900/0a0a0a/d4af37?text=Art+Heaven';

        for (let i = 1; i <= 9; i++) {
            const art = cloudData[i] || { url: placeholder, label: "الرتبة شاغرة حالياً" };
            const isTop = i <= 3;
            const frameClass = isTop ? (i==1?'gojo':(i==2?'geto':'shoko')) : 'silver';
            const rankText = i == 1 ? "المركز الأول" : i == 2 ? "المركز الثاني" : i == 3 ? "المركز الثالث" : "المركز " + i;
            
            const html = `
                <div class="frame ${frameClass}" style="position:relative;">
                    <div class="rank-badge">${rankText}</div>
                    <img src="${art.url}" ondblclick="viewImage('${art.url}')" style="cursor: pointer; width:100%; height:100%; object-fit:cover;">
                    <div style="position:absolute; bottom:0; width:100%; background:linear-gradient(transparent, rgba(0,0,0,0.9)); color:#d4af37; padding:15px 5px; text-align:center; font-weight:bold; font-size:14px;">
                        ${art.label}
                    </div>
                </div>`;
            if (isTop) top3.innerHTML += html;
            else silver.innerHTML += html;
        }
    });
</script>
</body>
</html>
