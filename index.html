<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متحف آرت هيفن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* --- تنسيق الستارة والرسالة الترحيبية (أهم جزء طلبته) --- */
        .curtain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100000; display: none; justify-content: center; align-items: center;
            overflow: hidden; cursor: pointer;
        }
        .curtain-side {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: #7a0000;
            background-image: repeating-linear-gradient(90deg, #7a0000, #7a0000 40px, #8b0000 41px, #8b0000 80px);
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 1;
        }
        .curtain-side.left { left: 0; border-right: 2px solid #d4af37; }
        .curtain-side.right { right: 0; border-left: 2px solid #d4af37; }
        
        .curtain.opened .left { transform: translateX(-100%); }
        .curtain.opened .right { transform: translateX(100%); }

        .welcome-msg {
            position: relative; z-index: 100001; text-align: center;
            color: white; font-family: 'Cairo'; transition: 0.8s;
        }
        .welcome-msg h1 { font-size: 1.5rem; margin-bottom: 10px; opacity: 0.8; }
        .welcome-msg h2 { font-size: 3rem; color: #d4af37; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .curtain.opened .welcome-msg { opacity: 0; visibility: hidden; }

        /* --- تنسيق القائمة الجانبية --- */
        .menu-icon {
            position: fixed; top: 15px; right: 15px; z-index: 1001;
            cursor: pointer; background: rgba(212, 175, 55, 0.1);
            padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .menu-icon span { width: 25px; height: 3px; background: #d4af37; transition: 0.3s; }

        .side-menu {
            position: fixed; top: 0; right: -300px; width: 260px; height: 100%;
            background: #0a0a0a; z-index: 100005; transition: 0.4s ease;
            padding: 80px 20px; font-family: 'Cairo'; border-left: 2px solid #d4af37;
        }
        .side-menu.open { right: 0; box-shadow: -5px 0 20px rgba(0,0,0,0.8); }
        .close-menu { position: absolute; top: 20px; left: 20px; font-size: 26px; color: #d4af37; cursor: pointer; }

        .menu-item {
            display: block; color: #fff; text-decoration: none; padding: 15px;
            margin-bottom: 12px; border-radius: 10px; background: #1a1a1a;
            font-weight: bold; border-right: 4px solid transparent; text-align: center;
        }
        .menu-item:hover { background: #222; border-right-color: #d4af37; color: #d4af37; }

        /* --- تنسيق الصور والتعليقات --- */
        .frame { position: relative; border-radius: 15px; overflow: hidden; border: 2px solid #333; margin-bottom: 25px; }
        .rank-badge {
            position: absolute; top: 15px; width: 100%; text-align: center;
            color: #ffd700; font-weight: 900; font-size: 1.2rem;
            text-shadow: 2px 2px 4px #000; z-index: 10;
        }
        #login-screen {
            display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
            background:#111; padding:30px; border-radius:15px; border:2px solid #d4af37;
            z-index:10001; text-align:center; width: 280px;
        }
    </style>
</head>
<body>

<div id="intro-container">
    <div id="start-overlay" style="position: absolute; width: 100%; text-align: center; top: 40%; z-index: 10;">
        <h2 style="color:#d4af37; font-family:'Cairo';">مرحباً بك في آرت هيفن</h2>
        <button onclick="playWithSound()" style="background:#d4af37; padding:15px 40px; border-radius:30px; cursor:pointer; font-weight:bold;">🔊 دخول العرض</button>
    </div>
    <video id="intro-video" playsinline style="width:100%; height:100%; object-fit:cover;">
        <source src="intro.mp4" type="video/mp4">
    </video>
    <button id="skip-btn" onclick="startMuseum()" style="display:none; position:fixed; bottom:30px; left:30px; z-index:100003; background:rgba(0,0,0,0.6); color:#d4af37; border:1px solid #d4af37; padding:12px 24px; cursor:pointer; border-radius:8px;">تخطي العرض ←</button>
</div>

<div class="curtain" id="curtain" onclick="openCurtain()">
    <div class="curtain-side left"></div>
    <div class="curtain-side right"></div>
    <div class="welcome-msg">
        <h1>مرحباً بكم في</h1>
        <h2>آرت هيفن</h2>
        <p style="background: rgba(212,175,55,0.1); padding: 10px 20px; border-radius: 50px; border: 1px dashed #d4af37; display: inline-block; margin-top:15px;">اضغط لفتح الستارة 🏛️</p>
    </div>
</div>

<audio id="bg-music" loop><source src="bg.mp3" type="audio/mpeg"></audio>

<div class="menu-icon" onclick="toggleMenu()"><span></span><span></span><span></span></div>

<div class="side-menu" id="sideMenu">
    <div class="close-menu" onclick="toggleMenu()">✕</div>
    <a href="server.html" target="_blank" class="menu-item">🌐 السيرفر</a>
    <div class="menu-item" onclick="toggleSettings()">⚙️ الإعدادات</div>
    <div id="settingsBox" style="display:none; padding:15px; background:#111; border-radius:10px; margin-top:5px;">
        <label style="color:#d4af37; font-size:12px;">مستوى الصوت</label>
        <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)" style="width:100%;">
    </div>
</div>

<div class="museum" id="top3-container"></div>
<div class="silver-gallery" id="silver-container"></div>

<div id="comments-section" style="max-width: 900px; margin: 50px auto; padding: 20px;">
    <script src="https://giscus.app/client.js"
        data-repo="omarsib/art-heaven-museum"
        data-repo-id="R_kgDORdS7Fw"
        data-category="Show and tell"
        data-category-id="DIC_kwDORdS7F84C3rx6"
        data-mapping="pathname"
        data-theme="dark"
        data-lang="ar"
        crossorigin="anonymous"
        async>
    </script>
</div>

<div id="login-screen">
    <h3 style="color:#d4af37;">منطقة الإدارة</h3>
    <input type="password" id="passInput" placeholder="كلمة السر..." style="width:80%; padding:10px; margin:15px 0;">
    <button onclick="checkPass()" style="background:#d4af37; padding:10px 30px; cursor:pointer; border-radius:5px;">دخول</button>
    <button onclick="closeLogin()" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer;">إلغاء</button>
</div>

<div id="admin-panel" style="display:none; position:fixed; bottom:20px; right:20px; background:#222; padding:20px; border-radius:15px; border:1px solid #d4af37; z-index:9999; width: 260px;">
    <h3 style="color:#d4af37;">إدارة المتحف</h3>
    <input type="number" id="imgOrder" placeholder="رقم المركز" style="width:100%; margin-bottom:10px; background:#333; color:#fff; padding:8px;">
    <input type="text" id="artistName" placeholder="اسم الرسام..." style="width:100%; margin-bottom:10px; background:#333; color:#fff; padding:8px;">
    <input type="file" id="imageInput" accept="image/*" style="width:100%; color:#fff; margin-bottom:10px;">
    <button onclick="uploadImage()" style="width:100%; background:#d4af37; padding:10px; font-weight:bold; cursor:pointer;">نشر</button>
    <button onclick="hideAdmin()" style="color:red; background:none; border:none; margin-top:10px; width:100%; cursor:pointer;">إغلاق</button>
    <p id="status" style="color:gold; font-size:11px; text-align:center; margin-top:10px;"></p>
</div>

<div onclick="showLogin()" style="position:fixed; bottom:0; left:0; width:40px; height:40px; cursor:pointer; opacity:0.01; background:white; z-index:10000;"></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyB3boy-qFEQsumI-c56wrjb-q-bBvpGaZc",
        authDomain: "art-heaven-2ebcc.firebaseapp.com",
        databaseURL: "https://art-heaven-2ebcc-default-rtdb.firebaseio.com",
        projectId: "art-heaven-2ebcc",
        storageBucket: "art-heaven-2ebcc.firebasestorage.app",
        messagingSenderId: "982139498852",
        appId: "1:982139498852:web:fcb1bec8520a896e988a71"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_KEY = '9f747dc546be7780cc631dd85cd4be26';

    function playWithSound() {
        const v = document.getElementById('intro-video');
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('skip-btn').style.display = 'block';
        v.play();
    }

    function startMuseum() {
    const intro = document.getElementById('intro-container');
    document.getElementById('intro-video').pause();
    intro.style.opacity = "0";
    setTimeout(() => { 
        intro.style.display = "none"; 
        const curtain = document.getElementById('curtain');
        curtain.style.display = "flex"; // تأكد أنها flex وليس block
    }, 800);
}
    document.getElementById('intro-video').onended = startMuseum;

    function openCurtain() {
        document.getElementById('curtain').classList.add('opened');
        document.getElementById('bg-music').play();
    }

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }
    function toggleSettings() { 
        const s = document.getElementById('settingsBox');
        s.style.display = (s.style.display === 'none') ? 'block' : 'none';
    }
    function changeVolume(v) { document.getElementById('bg-music').volume = v; }

    // جلب البيانات من Firebase
    db.ref('museum').on('value', (snapshot) => {
        const top3 = document.getElementById('top3-container');
        const silver = document.getElementById('silver-container');
        top3.innerHTML = ''; silver.innerHTML = '';
        const data = snapshot.val() || {};
        for (let i = 1; i <= 10; i++) {
            const art = data[i] || { url: 'https://placehold.co/400x600?text=Empty', label: "شاغر" };
            const html = `
                <div class="frame">
                    <div class="rank-badge">المركز ${i}</div>
                    <img src="${art.url}" style="width:100%;">
                    <div style="background:rgba(0,0,0,0.8); color:#d4af37; padding:10px; text-align:center;">${art.label}</div>
                </div>`;
            if (i <= 3) top3.innerHTML += html; else silver.innerHTML += html;
        }
    });

    // إدارة الإدارة
    function showLogin() { document.getElementById('login-screen').style.display = 'block'; }
    function closeLogin() { document.getElementById('login-screen').style.display = 'none'; }
    function checkPass() {
        if(document.getElementById('passInput').value === "1234") {
            closeLogin();
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("خطأ!"); }
    }
    function hideAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    async function uploadImage() {
        const file = document.getElementById('imageInput').files[0];
        const order = document.getElementById('imgOrder').value;
        const name = document.getElementById('artistName').value || "رسام مجهول";
        if (!file || !order) return alert("أكمل البيانات!");
        document.getElementById('status').innerText = "جاري الرفع...";
        const fd = new FormData(); fd.append('image', file);
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const d = await res.json();
            if (d.success) {
                await db.ref('museum/' + order).set({ url: d.data.url, order: order, label: name });
                document.getElementById('status').innerText = "تم النشر!";
            }
        } catch (e) { document.getElementById('status').innerText = "فشل الرفع!"; }
    }
</script>

</body>
</html>
