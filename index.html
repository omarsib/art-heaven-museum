<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متحف آرت هيفن</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="curtain" id="curtain" onclick="openCurtain()">
        <div class="curtain-side left"></div>
        <div class="curtain-side right">
            <div class="welcome-msg">
                <h2>مرحباً بكم في آرت هيفن</h2>
                <p>اضغط لفتح الستارة</p>
            </div>
        </div>
    </div>

    <div class="museum">
        <div class="frame gojo">
            <img src="images/gojo.jpg" alt="المركز الأول" onerror="this.style.display='none'">
            <div class="label">المركز الأول: Gojo</div>
        </div>
        <div class="frame geto">
            <img src="images/geto.jpg" alt="المركز الثاني" onerror="this.style.display='none'">
            <div class="label">المركز الثاني: Geto</div>
        </div>
        <div class="frame shoko">
            <img src="images/shoko.jpg" alt="المركز الثالث" onerror="this.style.display='none'">
            <div class="label">المركز الثالث: Shoko</div>
        </div>
    </div>

    <div id="comments-section" style="max-width: 900px; margin: 100px auto; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px;">
        <h2 style="color: gold; text-align: center;">زهرة تقييمات الزوار</h2>
        <script src="https://giscus.app/client.js"
            data-repo="omarsib/art-heaven-museum"
            data-repo-id="R_kgN..." 
            data-category="Announcements"
            data-category-id="DIC_..."
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="dark"
            data-lang="ar"
            crossorigin="anonymous"
            async>
        </script>
    </div>

    <script>
        function openCurtain() {
            const curtain = document.getElementById('curtain');
            curtain.classList.add('opened');
            // التأكد من إزالة الستارة تماماً بعد انتهاء الحركة لكي لا تعيق الضغط على الصور
            setTimeout(() => {
                curtain.style.display = 'none';
            }, 2500); 
        }
    </script>
</body>
</html>
