<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متحف آرت هيفن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="curtain" id="curtain" onclick="openCurtain()">
        <div class="curtain-side left"></div>
        <div class="curtain-side right"></div>
        <div class="welcome-msg">
            <h1>مرحباً بكم في</h1>
            <h2 class="brand-name">آرت هيفن</h2>
            <p>اضغط هنا لفتح الستارة</p>
        </div>
    </div>

    <div class="museum">
        <div class="frame gojo">
            <img src="images/gojo.jpg" alt="المركز الأول" onerror="this.style.display='none'">
            <div class="label">المركز الأول: Gojo</div>
        </div>
        <div class="frame geto">
            <img src="images/geto.jpg" alt="المركز الثاني" onerror="this.style.display='none'">
            <div class="label">المركز الثاني: Geto</div>
        </div>
        <div class="frame shoko">
            <img src="images/shoko.jpg" alt="المركز الثالث" onerror="this.style.display='none'">
            <div class="label">المركز الثالث: Shoko</div>
        </div>
    </div>

    <div class="silver-gallery">
        <div class="frame silver"><img src="images/art4.jpg" onerror="this.style.display='none'"><div class="label-silver">#4</div></div>
        <div class="frame silver"><img src="images/art5.jpg" onerror="this.style.display='none'"><div class="label-silver">#5</div></div>
        <div class="frame silver"><img src="images/art6.jpg" onerror="this.style.display='none'"><div class="label-silver">#6</div></div>
        <div class="frame silver"><img src="images/art7.jpg" onerror="this.style.display='none'"><div class="label-silver">#7</div></div>
        <div class="frame silver"><img src="images/art8.jpg" onerror="this.style.display='none'"><div class="label-silver">#8</div></div>
        <div class="frame silver"><img src="images/art9.jpg" onerror="this.style.display='none'"><div class="label-silver">#9</div></div>
        </div>

    <div id="comments-section">
        <h2 class="comments-title">زهرة تقييمات الزوار</h2>
        <script src="https://giscus.app/client.js"
            data-repo="omarsib/art-heaven-museum"
            data-repo-id="R_kgNOF7e_2A" 
            data-category="Announcements"
            data-category-id="DIC_kwNOF7e_2M4Cke-R"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="dark"
            data-lang="ar"
            crossorigin="anonymous"
            async>
        </script>
    </div>

    <div id="admin-panel" style="display:none; position:fixed; bottom:20px; right:20px; background:#222; padding:20px; border-radius:15px; border:1px solid #d4af37; z-index:9999; width: 260px; box-shadow: 0 0 20px rgba(0,0,0,0.8);">
        <h3 style="color:#d4af37; margin-top:0; font-size: 1.2rem;">إضافة لوحة جديدة</h3>
        
        <label style="color:#ccc; font-size:12px; display:block; margin-bottom:5px;">رقم الترتيب (مثلاً 10):</label>
        <input type="number" id="imgOrder" value="10" style="width:100%; margin-bottom:15px; background:#333; color:#fff; border:1px solid #444; border-radius:5px; padding:8px;">
        
        <input type="file" id="imageInput" accept="image/*" style="margin-bottom:15px; color:#fff; font-size:12px; width: 100%;">
        
        <button onclick="uploadImage()" id="uploadBtn" style="width:100%; background:#d4af37; color:#000; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:8px; transition: 0.3s;">رفع وتحديد المكان</button>
        
        <p id="status" style="color:#ffd700; font-size:11px; margin-top:12px; text-align:center; min-height: 15px;"></p>
        
        <button onclick="toggleAdmin()" style="background:transparent; color:#ff4444; border:none; cursor:pointer; font-size:12px; display:block; margin:15px auto 0;">إغلاق اللوحة</button>
        <button onclick="clearAllData()" style="background:transparent; color:#888; border:none; cursor:pointer; font-size:10px; display:block; margin:5px auto 0;">حذف الصور المرفوعة (لي فقط)</button>
    </div>

    <div onclick="toggleAdmin()" style="position:fixed; bottom:0; left:0; width:20px; height:20px; cursor:pointer; opacity:0.01; background:white; z-index:10000;"></div>

    <script>
        // 1. وظيفة فتح الستارة
        function openCurtain() {
            document.getElementById('curtain').classList.add('opened');
        }

        // 2. إعدادات الـ API ونظام الرفع
        const API_KEY = '9f747dc546be7780cc631dd85cd4be26';

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const orderInput = document.getElementById('imgOrder');
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');

            if (!fileInput.files[0]) return alert("يا عمر، اختر صورة أولاً!");

            status.innerText = "جاري معالجة الرفع...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    saveImageUrl(data.data.url, orderInput.value);
                    status.innerText = "تم الرفع والترتيب بنجاح!";
                    setTimeout(() => location.reload(), 1000);
                }
            } catch (error) {
                status.innerText = "حدث خطأ غير متوقع.";
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }

        // حفظ الرابط والترتيب في المتصفح
        function saveImageUrl(url, order) {
            let savedImages = JSON.parse(localStorage.getItem('myArts')) || [];
            savedImages.push({ url: url, order: parseInt(order) });
            // ترتيب البيانات لضمان ظهورها بالتسلسل الصحيح
            savedImages.sort((a, b) => a.order - b.order);
            localStorage.setItem('myArts', JSON.stringify(savedImages));
        }

        // تحميل الصور المرفوعة وعرضها في القاعة الفضية
        function loadGallery() {
            const gallery = document.querySelector('.silver-gallery');
            let savedImages = JSON.parse(localStorage.getItem('myArts')) || [];
            
            savedImages.forEach((imgObj) => {
                const artHtml = `
                    <div class="frame silver">
                        <img src="${imgObj.url}" alt="لوحة مرفوعة">
                        <div class="label-silver">#${imgObj.order}</div>
                    </div>`;
                gallery.innerHTML += artHtml;
            });
        }

        // وظيفة اختيارية لمسح البيانات إذا أردت البدء من جديد
        function clearAllData() {
            if(confirm("هل تريد حذف جميع الصور التي رفعتها؟")) {
                localStorage.removeItem('myArts');
                location.reload();
            }
        }

        // تشغيل الجاليري عند تحميل الصفحة تماماً
        window.addEventListener('load', loadGallery);
    </script>
</body>
</html>
