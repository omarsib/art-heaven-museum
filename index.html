<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متحف آرت هيفن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --gold: #d4af37; --glow: rgba(212, 175, 55, 0.6); }
        body { background-color: #0a0a0a; margin: 0; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* العنوان الذهبي المحسن للجوال */
        .museum-title {
            text-align: center;
            font-size: clamp(30px, 8vw, 60px); /* حجم مرن حسب الشاشة */
            color: var(--gold);
            text-shadow: 0 0 15px var(--glow);
            margin: 20px 0;
            font-weight: 900;
        }

        /* زر السيرفر - زاوية الجوال */
        .server-btn {
            position: fixed; top: 15px; left: 15px;
            background: var(--gold); color: #000;
            padding: 8px 20px; border-radius: 20px;
            font-weight: 900; font-size: 14px;
            border: none; cursor: pointer; z-index: 2000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* صفحة السيرفر الكاملة */
        #server-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f0f; z-index: 3000; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            box-sizing: border-box; overflow-y: auto;
        }
        .server-card {
            max-width: 600px; width: 100%; background: #1a1a1a;
            padding: 30px; border-radius: 20px; border: 1px solid var(--gold);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .server-card h2 { color: var(--gold); font-size: 32px; margin-bottom: 20px; }
        .server-card p { color: #ccc; line-height: 1.8; font-size: 16px; }
        .back-btn { margin-top: 25px; background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 10px 30px; border-radius: 10px; cursor: pointer; }

        /* تعديلات المعرض للجوال */
        .museum { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 10px; 
        }
        .frame { 
            width: 90%; max-width: 350px; /* صورة واحدة في السطر للجوال */
            border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; position: relative;
            background: #111;
        }
        .frame img { width: 100%; display: block; }
        
        /* نافذة التكبير */
        #image-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; justify-content: center; align-items: center; }
        #full-image { max-width: 98%; max-height: 90%; object-fit: contain; }

        @media (max-width: 600px) {
            .museum-title { margin-top: 60px; } /* مسافة للزر */
        }
    </style>
</head>
<body>

    <button class="server-btn" onclick="openServerPage()">السيرفر</button>

    <div id="server-page">
        <div class="server-card">
            <h2>سيرفر آرت هيفن</h2>
            <p>أهلاً بك في الصفحة التعريفية للسيرفر. هنا يمكنك معرفة كيفية الانضمام لمتحفنا العريق.</p>
            <hr style="border-color: #333; margin: 20px 0;">
            <p><strong>طرق المشاركة:</strong></p>
            <ul style="color: #ccc; text-align: right; display: inline-block;">
                <li>الفوز بمسابقة الرسم الأسبوعية.</li>
                <li>الحصول على لقب "رسام متميز" في السيرفر.</li>
                <li>تقديم عمل فني يبهر الإدارة.</li>
            </ul>
            <br>
            <a href="https://discord.gg/cxccGZY9U5" style="color: #7289da; text-decoration: none; font-size: 20px; font-weight: bold;">انضم للديسكورد الآن</a>
            <br>
            <button class="back-btn" onclick="closeServerPage()">العودة للمتحف</button>
        </div>
    </div>

    <div id="image-viewer" onclick="closeViewer()" ondblclick="closeViewer()">
        <img id="full-image" src="">
    </div>

    <div class="curtain" id="curtain" onclick="openCurtain()">
        <div class="curtain-side left"></div>
        <div class="curtain-side right"></div>
        <div class="welcome-msg">
            <h2 class="brand-name">آرت هيفن</h2>
            <p>اضغط للفتح</p>
        </div>
    </div>

    <h1 class="museum-title">متحف آرت هيفن</h1>

    <div class="museum" id="top3-container"></div>
    <div class="silver-gallery" id="silver-container"></div>

    <div onclick="toggleAdmin()" style="position:fixed; bottom:0; left:0; width:40px; height:40px; cursor:pointer; opacity:0; z-index:5000;"></div>
    
    <div id="admin-panel" style="display:none; position:fixed; bottom:10px; right:10px; background:#222; padding:15px; border-radius:15px; border:1px solid var(--gold); z-index:5001; width: 250px;">
        <input type="number" id="imgOrder" placeholder="رقم المركز" style="width:100%; margin-bottom:10px; background:#333; color:#fff; border:1px solid #444; padding:8px;">
        <input type="text" id="artistName" placeholder="اسم الرسام" style="width:100%; margin-bottom:10px; background:#333; color:#fff; border:1px solid #444; padding:8px;">
        <input type="file" id="imageInput" style="color: #fff; font-size: 12px; margin-bottom: 10px;">
        <button onclick="uploadImage()" style="width:100%; background:var(--gold); border:none; padding:10px; font-weight:bold;">نشر</button>
        <button onclick="toggleAdmin()" style="background:none; color:red; border:none; width:100%; margin-top:5px;">إغلاق</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3boy-qFEQsumI-c56wrjb-q-bBvpGaZc",
            authDomain: "art-heaven-2ebcc.firebaseapp.com",
            databaseURL: "https://art-heaven-2ebcc-default-rtdb.firebaseio.com",
            projectId: "art-heaven-2ebcc",
            storageBucket: "art-heaven-2ebcc.firebasestorage.app",
            messagingSenderId: "982139498852",
            appId: "1:982139498852:web:fcb1bec8520a896e988a71"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function openCurtain() { document.getElementById('curtain').classList.add('opened'); }
        function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display==='none'?'block':'none'; }
        
        function openServerPage() { document.getElementById('server-page').style.display = 'flex'; }
        function closeServerPage() { document.getElementById('server-page').style.display = 'none'; }

        function viewImage(src) {
            document.getElementById('full-image').src = src;
            document.getElementById('image-viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeViewer() {
            document.getElementById('image-viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function uploadImage() {
            const file = document.getElementById('imageInput').files[0];
            const order = document.getElementById('imgOrder').value;
            const name = document.getElementById('artistName').value || "رسام مبدع";
            if(!file || !order) return alert("أكمل البيانات!");
            
            const fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=9f747dc546be7780cc631dd85cd4be26`, {method:'POST', body:fd});
                const d = await res.json();
                if(d.success) {
                    await db.ref('museum/'+order).set({url: d.data.url, order: parseInt(order), label: name});
                    alert("تم النشر!");
                }
            } catch(e) { alert("خطأ!"); }
        }

        db.ref('museum').on('value', (snap) => {
            const top3 = document.getElementById('top3-container');
            const silver = document.getElementById('silver-container');
            top3.innerHTML = ''; silver.innerHTML = '';
            const data = snap.val() || {};
            for(let i=1; i<=9; i++) {
                const art = data[i] || {url: 'https://via.placeholder.com/300?text=Soon', label: 'قريباً...'};
                const isTop = i <= 3;
                const html = `
                    <div class="frame">
                        <img src="${art.url}" ondblclick="viewImage('${art.url}')">
                        <div style="background:rgba(0,0,0,0.7); color:var(--gold); padding:5px; text-align:center; font-size:12px;">${art.label}</div>
                    </div>`;
                if(isTop) top3.innerHTML += html;
                else silver.innerHTML += html;
            }
        });
    </script>
</body>
</html>
