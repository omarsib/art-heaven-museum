<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* التنسيق الجديد لزر العودة - تصميم عمر */
        .nav-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6); /* خلفية داكنة شفافة */
            color: #d4af37 !important; /* لون ذهبي */
            border: 1px solid #d4af37;
            padding: 10px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            z-index: 1000;
            backdrop-filter: blur(10px); /* تأثير البلور السحري */
            -webkit-backdrop-filter: blur(10px);
            transition: 0.3s all ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: #d4af37;
            color: #000 !important;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-3px);
        }

        /* تنسيق عام للخلفية ليتناسب مع المتحف */
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d; /* أسود فخم */
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        .card {
            background: rgba(26, 26, 26, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #d4af37;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-btn">← العودة للمتحف</a>

    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
        <div class="card">
            <h1 style="color: #d4af37;">سيرفر آرت هيفن 🎨</h1>
            <p style="font-size: 18px; line-height: 2;">
                مرحباً بك في عالم الإبداع! لكي تكون جزءاً من هذا المتحف وتُعرض لوحتك هنا، عليك اتباع الآتي:
            </p>
            <ul style="text-align: right; display: inline-block; font-size: 16px; color: #ccc;">
                <li>🔥 المشاركة في مسابقات السيرفر الأسبوعية.</li>
                <li>🏆 الفوز بالمركز الأول أو الثاني أو الثالث.</li>
                <li>✨ أو أن ترسم رسمة استثنائية يختارها فريق الإدارة.</li>
            </ul>
            <br><br>
            <a href="https://discord.gg/YnsvKUkgRX" style="background: #7289da; color: white; padding: 15px 40px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block; transition: 0.3s;">انضم إلينا في ديسكورد</a>
        </div>
    </div>

</body>
</html>
